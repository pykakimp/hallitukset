<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hallitukset Verkkosivu</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            /* MUUTOS: Vaihdettu Times New Roman pääfontiksi */
            font-family: 'Times New Roman', Times, Baskerville, Georgia, serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column; 
            justify-content: flex-start; 
        }

        /* --- Header & Logo --- */
        #site-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: #0a0a0a;
            border-bottom: 1px solid #222222;
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 5vw;
            box-sizing: border-box;
        }

        .logo-placeholder {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer; 
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #00529b, #003a70);
            border-radius: 6px;
            border: 1px solid #00529b;
        }
        
        /* --- Search Container --- */
        #search-container {
            margin-top: 90px; 
            margin-left: 5vw;
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(145deg, #1c1c1c, #111111);
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid #333333;
            width: fit-content;
        }

        #search-container label {
            font-size: 1rem;
            color: #bbbbbb;
            font-weight: bold;
        }

        #date-search {
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #555555;
            padding: 8px 12px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 1rem;
            color-scheme: dark; 
        }

        #date-search:focus {
            outline: none;
            border-color: #00529b;
        }

        #search-btn {
            background-color: #00529b;
            color: #ffffff;
            border: none;
            padding: 9px 18px;
            border-radius: 4px;
            font-weight: bold;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        #search-btn:hover {
            background-color: #0073e6;
        }

        #search-btn:active {
            transform: scale(0.97);
        }

        /* --- Layout Container --- */
        #layout-container {
            display: flex;
            width: 90%; 
            max-width: 1200px;
            margin-top: 30px; 
            margin-bottom: 100vh; 
            margin-left: 5vw; 
            position: relative;
        }

        /* Fixed "Scanner" Focal Line */
        #selection-line {
            position: fixed;
            top: 200px; 
            left: 5vw;
            width: 375px; 
            height: 1px;
            background-color: rgba(255, 255, 255, 0.15);
            border-top: 1px dashed rgba(255, 255, 255, 0.4);
            z-index: 10;
            pointer-events: none; 
        }

        /* 1. Timeline Ruler */
        #timeline-ruler {
            width: 100px; 
            position: relative;
            border-right: 2px solid #555555;
            flex-shrink: 0; 
        }

        #timeline-highlight {
            position: absolute;
            left: 0;
            width: 100%;
            background: linear-gradient(to right, transparent, rgba(0, 82, 155, 0.3));
            pointer-events: none; 
            z-index: 1; 
            transition: top 0.15s ease-out, height 0.15s ease-out;
        }

        .tick { position: absolute; right: 0; background-color: #888888; z-index: 2; }
        .tick-day { width: 4px; height: 1px; background-color: #333333; }
        .tick-month { width: 10px; height: 2px; background-color: #aaaaaa; }
        .tick-year { width: 26px; height: 2px; background-color: #ffffff; }
        
        .tick-term { 
            width: 14px; 
            height: 1px; 
            background-color: #00529b; 
            z-index: 4; 
        }

        .year-label {
            position: absolute;
            right: 40px; 
            transform: translateY(-50%);
            font-weight: bold;
            font-size: 1rem; 
            color: #ffffff;
            letter-spacing: 1px;
            z-index: 2;
        }

        .term-start-label {
            position: absolute;
            right: 20px; 
            transform: translateY(-50%);
            font-size: 0.75rem; 
            color: #888888;     
            z-index: 4;
        }

        /* 2. Cabinets Area */
        #cabinets-area {
            width: 250px;
            position: relative;
            margin-left: 25px; 
            flex-shrink: 0;
        }

        .cabinet-block {
            position: absolute;
            left: 0;
            right: 0; 
            background: linear-gradient(145deg, #1c1c1c, #111111);
            border: 1px solid #333333;
            border-left: 4px solid #333333; 
            border-radius: 5px; 
            padding: 4px 10px; 
            box-sizing: border-box;
            overflow: hidden; 
            cursor: pointer;
            transition: right 0.15s ease-out, background 0.15s ease-out;
            
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;     
            text-align: center;
        }

        .cabinet-block:hover {
            border-left-color: #00529b;
        }

        .cabinet-block.active {
            border-left: 4px solid #ffffff;
            background: linear-gradient(145deg, #00529b, #003a70);
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            z-index: 5;
            right: -30px; 
        }

        .cabinet-block h3 { 
            margin: 0; 
            font-size: 1.1rem; 
            font-weight: 700; 
            color: #ffffff; 
            transition: font-size 0.15s; 
        }
        
        .cabinet-block p { 
            margin: 4px 0 0 0; 
            font-size: 0.9rem; 
            font-weight: 500; 
            color: #dddddd; 
            transition: font-size 0.15s, color 0.15s; 
        }

        .cabinet-block.active h3 { font-size: 1.4rem; }
        .cabinet-block.active p { font-size: 1.1rem; color: #ffffff; }

        /* 3. Infobox */
        #infobox-container {
            flex-grow: 1;
            margin-left: 140px; 
        }

        #infobox {
            position: sticky;
            top: 100px; 
            background-color: #111111;
            border: 1px solid #333333;
            border-top: 5px solid #00529b;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        #infobox h2 { margin-top: 0; font-size: 2rem; color: #ffffff; border-bottom: 1px solid #333; padding-bottom: 10px; }
        #infobox p { font-size: 1.2rem; line-height: 1.6; color: #cccccc; }
        .infobox-label { color: #888888; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; display: block; margin-top: 15px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <header id="site-header">
        <div class="logo-placeholder" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
            <div class="logo-icon"></div>
            <span>Hallitukset</span>
        </div>
    </header>

    <div id="search-container">
        <label for="date-search">Hae ajanhetkeä:</label>
        <input type="date" id="date-search" min="1917-11-27" max="2026-01-01" value="1917-11-27">
        <button id="search-btn">Siirry</button>
    </div>

    <div id="layout-container">
        <div id="timeline-ruler">
            <div id="timeline-highlight"></div>
        </div>
        
        <div id="cabinets-area"></div>
        
        <div id="infobox-container">
            <div id="infobox"></div>
        </div>
    </div>
    
    <div id="selection-line"></div>

    <script>
        const startDate = new Date(1917, 10, 27); 
        const endDate = new Date(2026, 0, 1);     
        const pixelsPerDay = 1.33; 
        const selectionOffset = 200; 

        const governments = [
            { id: 1, name: "Svinhufvud I", start: "1917-11-27", end: "1918-05-27", pmParty: "Nuorsuomalainen puolue", type: "Enemmistöhallitus", details: "Itsenäisen Suomen ensimmäinen hallitus (senaatti)." },
            { id: 2, name: "Paasikivi I", start: "1918-05-27", end: "1918-11-27", pmParty: "Suomalainen puolue", type: "Enemmistöhallitus", details: "Toimi Suomen sisällissodan päättymisen jälkeisissä oloissa." },
            { id: 3, name: "Ingman I", start: "1918-11-27", end: "1919-04-17", pmParty: "Kansallinen Kokoomus", type: "Enemmistöhallitus", details: "Ensimmäinen varsinainen valtioneuvosto hallintomuodon vahvistamisen jälkeen." },
            { id: 4, name: "K. Castrén", start: "1919-04-17", end: "1919-08-15", pmParty: "Kansallinen Edistyspuolue", type: "Vähemmistöhallitus", details: "Lyhytikäinen vähemmistöhallitus siirtymäkaudella." },
            { id: 5, name: "Vennola I", start: "1919-08-15", end: "1920-03-15", pmParty: "Kansallinen Edistyspuolue", type: "Vähemmistöhallitus", details: "Keskustapohjainen vähemmistöhallitus." },
            { id: 6, name: "Erich", start: "1920-03-15", end: "1921-04-09", pmParty: "Kansallinen Kokoomus", type: "Enemmistöhallitus", details: "Solmi Tarton rauhan Neuvosto-Venäjän kanssa vuonna 1920." }
        ];

        function parseDate(dateStr) { const parts = dateStr.split('-'); return new Date(parts[0], parts[1] - 1, parts[2]); }
        function getDaysBetween(d1, d2) { const msPerDay = 1000 * 60 * 60 * 24; return Math.round((d2 - d1) / msPerDay); }

        function updateHighlight(top, height) {
            const highlight = document.getElementById('timeline-highlight');
            highlight.style.top = `${top}px`;
            highlight.style.height = `${height}px`;
        }

        function updateInfoBox(gov) {
            const infobox = document.getElementById('infobox');
            const govStartDate = parseDate(gov.start);
            const govEndDate = parseDate(gov.end);
            const durationInDays = getDaysBetween(govStartDate, govEndDate);
            
            infobox.innerHTML = `
                <h2>${gov.id}. ${gov.name}</h2>
                <span class="infobox-label">Kesto</span>
                <p>${gov.start} – ${gov.end} <strong>(${durationInDays} päivää)</strong></p>
                <span class="infobox-label">Pääministerin Puolue</span>
                <p>${gov.pmParty}</p>
                <span class="infobox-label">Hallituksen Tyyppi</span>
                <p>${gov.type}</p>
                <span class="infobox-label">Lisätiedot</span>
                <p>${gov.details}</p>
            `;
        }

        // Setup Timeline Ruler
        const ruler = document.getElementById('timeline-ruler');
        const rulerFragment = document.createDocumentFragment();
        let currentDate = new Date(startDate);
        let currentYPosition = 0;

        while (currentDate <= endDate) {
            const isFirstDayOfYear = currentDate.getDate() === 1 && currentDate.getMonth() === 0;
            const isFirstDayOfMonth = currentDate.getDate() === 1 && !isFirstDayOfYear;
            const tick = document.createElement('div');
            tick.classList.add('tick');
            tick.style.top = `${currentYPosition}px`;
            if (isFirstDayOfYear) {
                tick.classList.add('tick-year');
                const label = document.createElement('div');
                label.classList.add('year-label');
                label.style.top = `${currentYPosition}px`;
                label.textContent = currentDate.getFullYear();
                rulerFragment.appendChild(label);
            } else if (isFirstDayOfMonth) { tick.classList.add('tick-month'); }
            else { tick.classList.add('tick-day'); }
            rulerFragment.appendChild(tick);
            currentDate.setDate(currentDate.getDate() + 1);
            currentYPosition += pixelsPerDay;
        }
        ruler.style.height = `${currentYPosition}px`;
        ruler.appendChild(rulerFragment);

        // Setup Cabinets and Term Start Labels
        const cabinetsArea = document.getElementById('cabinets-area');
        const cabinetsFragment = document.createDocumentFragment();
        const cabinetElements = []; 

        governments.forEach((gov) => {
            const govStartDate = parseDate(gov.start);
            const govEndDate = parseDate(gov.end);
            const daysFromStart = getDaysBetween(startDate, govStartDate);
            const durationInDays = getDaysBetween(govStartDate, govEndDate);
            const topPosition = daysFromStart * pixelsPerDay;
            const blockHeight = (durationInDays * pixelsPerDay) - 2;

            const block = document.createElement('div');
            block.classList.add('cabinet-block');
            block.style.top = `${topPosition}px`;
            block.style.height = `${Math.max(blockHeight, 8)}px`;
            block.innerHTML = `<h3>${gov.id}. ${gov.name}</h3><p>${gov.start}</p>`;

            block.addEventListener('click', () => {
                const layoutContainerTop = document.getElementById('layout-container').offsetTop; 
                window.scrollTo({
                    top: topPosition + layoutContainerTop - selectionOffset,
                    behavior: 'smooth' 
                });
            });

            cabinetElements.push(block);
            cabinetsFragment.appendChild(block);

            const termTick = document.createElement('div');
            termTick.classList.add('tick', 'tick-term');
            termTick.style.top = `${topPosition}px`;
            
            const termLabel = document.createElement('div');
            termLabel.classList.add('term-start-label');
            termLabel.style.top = `${topPosition}px`;
            
            const dateParts = gov.start.split('-');
            termLabel.textContent = `${parseInt(dateParts[2])}.${parseInt(dateParts[1])}.${dateParts[0]}`;
            
            ruler.appendChild(termTick);
            ruler.appendChild(termLabel);
        });

        cabinetsArea.style.height = `${currentYPosition}px`;
        cabinetsArea.appendChild(cabinetsFragment);

        // Search Engine Logic
        document.getElementById('search-btn').addEventListener('click', () => {
            const dateInput = document.getElementById('date-search').value;
            if (!dateInput) return;

            const targetDate = new Date(dateInput);
            
            if (targetDate < startDate) {
                alert("Aikajana alkaa 27.11.1917.");
                return;
            }
            if (targetDate > endDate) {
                alert("Aikajana päättyy vuoden 2026 alkuun.");
                return;
            }

            const daysFromStart = getDaysBetween(startDate, targetDate);
            const targetYPosition = daysFromStart * pixelsPerDay;
            
            const layoutContainerTop = document.getElementById('layout-container').offsetTop;
            window.scrollTo({
                top: targetYPosition + layoutContainerTop - selectionOffset,
                behavior: 'smooth'
            });
        });

        // Scroll Scanner Engine
        let currentActiveBlock = null;

        function checkScrollSelection() {
            const layoutContainerTop = document.getElementById('layout-container').offsetTop;
            const timelineY = window.scrollY + selectionOffset - layoutContainerTop;

            let foundGov = null;
            let foundBlock = null;

            for (let i = 0; i < governments.length; i++) {
                const block = cabinetElements[i];
                const top = parseInt(block.style.top);
                const height = parseInt(block.style.height);

                if (timelineY >= top && timelineY <= top + height) {
                    foundGov = governments[i];
                    foundBlock = block;
                    break;
                }
            }

            if (!foundGov) {
                if (timelineY < parseInt(cabinetElements[0].style.top)) {
                    foundGov = governments[0];
                    foundBlock = cabinetElements[0];
                } else {
                    foundGov = governments[governments.length - 1];
                    foundBlock = cabinetElements[cabinetElements.length - 1];
                }
            }

            if (currentActiveBlock !== foundBlock) {
                if (currentActiveBlock) currentActiveBlock.classList.remove('active');
                
                foundBlock.classList.add('active');
                updateInfoBox(foundGov);
                
                const topPosition = parseInt(foundBlock.style.top);
                const blockHeight = parseInt(foundBlock.style.height);
                updateHighlight(topPosition, Math.max(blockHeight, 8));
                
                currentActiveBlock = foundBlock;
            }
        }

        window.addEventListener('scroll', checkScrollSelection);
        checkScrollSelection(); 
    </script>
</body>
</html>
